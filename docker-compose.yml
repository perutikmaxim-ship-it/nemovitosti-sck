# ============================================================
# docker-compose.yml – Reality Bot
# ============================================================
# Použití:
#   docker compose up -d          # Spustí na pozadí
#   docker compose logs -f        # Sleduje logy
#   docker compose down           # Zastaví
#   docker compose restart        # Restartuje

version: "3.9"

services:
  reality-bot:
    build: .
    container_name: reality-bot
    restart: unless-stopped       # Automatický restart při pádu

    # Proměnné prostředí – načte z .env souboru
    env_file:
      - .env

    # Timezone
    environment:
      - TZ=Europe/Prague

    # Perzistentní data (SQLite databáze + logy)
    volumes:
      - reality-bot-data:/app/data
      - ./reality-bot.log:/app/reality-bot.log

    # Zdravotní kontrola (ping Telegram API)
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; r=requests.get('https://api.telegram.org', timeout=5); r.raise_for_status()"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

    # Limit zdrojů (volitelné)
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

# Pojmenovaný volume pro data
volumes:
  reality-bot-data:
    driver: local
