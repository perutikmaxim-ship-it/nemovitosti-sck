# ============================================================
# .gitlab-ci.yml – GitLab CI/CD pipeline pro Reality Bot
# ============================================================
# Spouští se automaticky při každém push do repozitáře.
# Fáze: lint → test → build (docker image)
#
# Nastavení v GitLab → Settings → CI/CD → Variables:
#   TELEGRAM_TOKEN   – token bota (masked)
#   TELEGRAM_CHAT_ID – ID chatu (masked)
#   CI_REGISTRY_*    – automaticky dostupné pro Docker registry

image: python:3.11-slim

stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"

# Sdílená cache pro pip
cache:
  paths:
    - .cache/pip
    - .venv/

# ============================================================
# FÁZE 1: Linting
# ============================================================
lint:
  stage: lint
  before_script:
    - pip install flake8 --quiet
  script:
    - echo "Kontrola syntaxe a stylu..."
    - flake8 . --max-line-length=100 --exclude=.venv,__pycache__ --count --statistics
  allow_failure: true   # Linting chyby nezastaví pipeline

# ============================================================
# FÁZE 2: Testy (import check)
# ============================================================
test:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y -qq libxml2-dev libxslt-dev gcc
    - pip install -r requirements.txt --quiet
  script:
    - echo "Kontrola importů a základní syntaxe..."
    - python -c "import database; print('OK: database')"
    - python -c "import notifier; print('OK: notifier')"
    - python -c "from scrapers import SrealityScraper, BazosScraper; print('OK: scrapers')"
    - python -c "import yaml; import os; print('OK: config loading')"
    - echo "Všechny importy OK"

# ============================================================
# FÁZE 3: Docker build (pouze main větev)
# ============================================================
build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"
    - echo "Docker image pushnut: $DOCKER_IMAGE"
  only:
    - main
    - master
  # Přeskočí pokud není nakonfigurován Docker registry
  allow_failure: true
