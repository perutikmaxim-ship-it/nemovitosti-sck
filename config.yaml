# ============================================================
# Konfigurace Reality Bota
# ============================================================

# Interval kontroly v sekundách (900 = 15 minut)
check_interval: 900

# Maximální cena v Kč
max_price: 4500000

# Minimální cena v Kč (0 = bez omezení)
min_price: 0

# ============================================================
# Lokalita - Středočeský kraj, cca do 1 hodiny od Prahy
# ============================================================
# Okresy Středočeského kraje (Praha je explicitně VYNECHÁNA)
# Seřazeno podle dostupnosti z Prahy
regions:
  # Kódy pro sreality.cz API
  sreality_region_id: 10  # Středočeský kraj

# Okresy Středočeského kraje (kódy pro sreality)
# Praha (ID 1010) je vynechána
districts:
  - name: "Praha-východ"
    sreality_id: 1041
  - name: "Praha-západ"
    sreality_id: 1042
  - name: "Kladno"
    sreality_id: 1025
  - name: "Mělník"
    sreality_id: 1032
  - name: "Mladá Boleslav"
    sreality_id: 1033
  - name: "Nymburk"
    sreality_id: 1036
  - name: "Kolín"
    sreality_id: 1026
  - name: "Kutná Hora"
    sreality_id: 1028
  - name: "Příbram"
    sreality_id: 1043
  - name: "Beroun"
    sreality_id: 1021
  - name: "Rakovník"
    sreality_id: 1044
  - name: "Středočeský kraj"
    sreality_id: 1040

# Klíčová slova pro lokality v textovém vyhledávání (bazos, idnes atd.)
location_keywords:
  - "Středočeský kraj"
  - "Praha-východ"
  - "Praha-západ"
  - "Kladno"
  - "Mělník"
  - "Mladá Boleslav"
  - "Nymburk"
  - "Kolín"
  - "Kutná Hora"
  - "Příbram"
  - "Beroun"
  - "Rakovník"

# Slova, která VYLUČUJÍ inzerát (Praha)
exclude_keywords:
  - "Praha 1"
  - "Praha 2"
  - "Praha 3"
  - "Praha 4"
  - "Praha 5"
  - "Praha 6"
  - "Praha 7"
  - "Praha 8"
  - "Praha 9"
  - "Praha 10"
  - "Praha 11"
  - "Praha 12"
  - "Praha 13"
  - "Praha 14"
  - "Praha 15"
  - "Praha 16"
  - "Praha 17"
  - "Praha 18"
  - "Praha 19"
  - "Praha 20"
  - "Praha 21"
  - "Praha 22"
  - "Hlavní město Praha"

# ============================================================
# Typy nemovitostí
# ============================================================
property_types:
  - "Rodinný dům"
  - "Chalupa"
  - "Chata"
  # Pokud chcete i byty, odkomentujte:
  # - "Byt"

# ============================================================
# Aktivní scrapery (true = zapnuto)
# ============================================================
scrapers:
  sreality: true
  bazos: true
  realingo: true
  reas: true
  idnes: true

# ============================================================
# HTTP konfigurace
# ============================================================
http:
  timeout: 30
  max_retries: 3
  retry_delay: 5  # sekundy mezi retry pokusy
  # Náhodná pauza mezi requesty (sekundy)
  min_delay: 1.0
  max_delay: 3.0
